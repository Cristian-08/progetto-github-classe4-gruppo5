<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Dinamico sul Form - Modern Style</title>
    <style>
        /* Reset e Base minimale */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            max-width: 450px;
            width: 100%;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 24px;
            color: #111827;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.875rem;
            color: #4b5563;
        }

        input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        button {
            width: 100%;
            background-color: #2563eb;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Messaggio inserito dinamicamente dal JS */
        .successo-messaggio {
            margin-top: 20px;
            padding: 14px;
            background-color: #ecfdf5;
            color: #065f46;
            border: 1px solid #a7f3d0;
            border-radius: 6px;
            font-size: 0.9rem;
            line-height: 1.4;
            animation: fadeIn 0.3s ease-out;
        }

        /* Stile di errore applicato dinamicamente */
        .errore {
            border-color: #ef4444 !important;
            background-color: #fef2f2;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Miglioramento Form - Task 05</h2>
        
        <form id="mio-form">
            <div class="form-group">
                <label for="nome">Nome completo</label>
                <input type="text" id="nome" placeholder="Es. Mario Rossi">
            </div>
            
            <div class="form-group">
                <label for="email">Indirizzo Email</label>
                <input type="email" id="email" placeholder="nome@esempio.com">
            </div>
            
            <button type="submit">Invia informazioni</button>
        </form>

        <div id="container-feedback"></div>
    </div>

    <script>
        const form = document.getElementById('mio-form');
        const containerFeedback = document.getElementById('container-feedback');

        form.addEventListener('submit', function(evento) {
            // 1. Ferma l'azione standard del browser
            evento.preventDefault();

            const campoNome = document.getElementById('nome');
            const campoEmail = document.getElementById('email');
            
            // Reset degli stati precedenti
            campoNome.classList.remove('errore');
            campoEmail.classList.remove('errore');
            containerFeedback.innerHTML = ''; 

            // 2. Validazione con rimozione degli spazi vuoti
            if (campoNome.value.trim() === '' || campoEmail.value.trim() === '') {
                if(campoNome.value.trim() === '') campoNome.classList.add('errore');
                if(campoEmail.value.trim() === '') campoEmail.classList.add('errore');
                return; 
            }

            // 3. Generazione e iniezione sicura del feedback nel DOM
            const messaggioSuccesso = document.createElement('p');
            messaggioSuccesso.className = 'successo-messaggio';
            messaggioSuccesso.textContent = '✓ Configurazione completata! I dati inseriti sono validi e il nodo è stato aggiunto correttamente alla struttura della pagina.';

            containerFeedback.appendChild(messaggioSuccesso);

            form.reset();
        });
    </script>

</body>
</html>
